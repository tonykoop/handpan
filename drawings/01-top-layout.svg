    <text x="12" y="22" font-size="15" font-weight="700">Drawing Notes</text>
    <text x="12" y="58" font-size="12">1. Primary datum: shell centerline.</text>
    <text x="12" y="80" font-size="12">2. Field positions are clock-layout starters.</text>
    <text x="12" y="102" font-size="12">3. Oval dimensions come from cut-list.csv.</text>
    <text x="12" y="124" font-size="12">4. Do not machine final pitch contours.</text>
    <text x="12" y="146" font-size="12">5. Tune by measured fundamental, octave,</text>
    <text x="30" y="164" font-size="12">and compound fifth partials.</text>
    <text x="12" y="195" font-size="12" font-weight="700">Material path:</text>
    <text x="106" y="195" font-size="12">1.0 mm DC04 or stainless branch.</text>
    <text x="12" y="220" font-size="12" font-weight="700">Release:</text>
    <text x="72" y="220" font-size="12">private review until measured build.</text>
